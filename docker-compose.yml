services:
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    ports:
      - 11434:11434
    volumes:
      - ${SELFHOST_ROOT}/ollama:/root/.ollama
    environment:
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
    networks:
      - default

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - 3000:8080
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - AIOHTTP_CLIENT_TIMEOUT=30
    volumes:
      - ${SELFHOST_ROOT}/open-webui:/app/backend/data
    networks:
      - default
    depends_on:
      - ollama

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - 8881:8080
    volumes:
      - ${SELFHOST_ROOT}/searxng:/etc/searxng
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    networks:
      - default

  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    volumes:
      - ${SELFHOST_ROOT}/data/syncthing:/var/syncthing
      - ${SYNC_DIR}:/var/sharing
      - ${MUSIC_DIR}:/var/music
      - ${BOOKS_DIR}:/var/books
      - ${DOCUMENTS_DIR}:/var/docs
      - ${SELFHOST_ROOT}/data/media/tv/:/var/media/tv
    ports:
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    networks:
      - default

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    ports:
      - 8090:80
    volumes:
      - ${HOME_DIR}:/srv
      - ${SELFHOST_ROOT}/filebrowser/config.db:/database.db
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    networks:
      - default
    restart: unless-stopped

  joplin-db:
    image: postgres:16
    container_name: joplin-db
    profiles:
        - full
        - server
    volumes:
        - ./joplin/db/data:/var/lib/postgresql/data
    networks:
        - default
    ports:
        - "5432:5432"
    restart: unless-stopped
    environment:
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_DB=${POSTGRES_DATABASE}

  joplin:
    image: joplin/server:latest
    container_name: joplin
    profiles:
        - full
        - server
    depends_on:
        - joplin-db
    ports:
        - "22300:22300"
    networks:
        - default
    restart: unless-stopped
    environment:
        - PUID=${PUID}
        - PGID=${PGID}
        - TZ={TZ}
        - APP_PORT=22300
        - APP_BASE_URL=${APP_BASE_URL}
        - DB_CLIENT=${DB_CLIENT}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DATABASE=${POSTGRES_DATABASE}
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PORT=${POSTGRES_PORT}
        - POSTGRES_HOST=${POSTGRES_HOST:-joplin-db}
    dns:
      - 1.1.1.1
      - 8.8.8.8

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - ADMIN_TOKEN="${ADMIN_TOKEN}"
    ports:
      - 81:80
    volumes:
      - ${SELFHOST_ROOT}/vw-data:/data
    networks:
      - default

  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    devices:
      - /dev/dri:/dev/dri
    ports:
      - 8096:8096
    volumes:
      - ${SELFHOST_ROOT}/jellyfin/config:/config
      - ${SELFHOST_ROOT}/jellyfin/cache:/cache
      - ${SELFHOST_ROOT}/data:/data
      - ${MOUNT_COLDSTORE}:/data/coldstore
      - ${MOUNT_NOTEBOOK}:/data/notebook
      - ${MOUNT_SECONDSTORE}/:/data/secondstore
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
    restart: unless-stopped
    networks:
      - default

  navidrome:
    image: deluan/navidrome:develop
    container_name: navidrome
    ports:
      - 4533:4533
    volumes:
      - ${SELFHOST_ROOT}/navidrome/data:/data
      - ${MUSIC_DIR}:/music:ro
      - ${SELFHOST_ROOT}/navidrome/data/cache:/cache
    environment:
      - ND_MUSICFOLDER=/music
      - ND_DATAFOLDER=/data
      - ND_CACHEDIRECTORY=/cache
      - ND_LOGLEVEL=debug
      - ND_SCANNER_GROUPALBUMRELEASES=true
      - ND_TRANSCODINGCACHESIZE=1GB
      - ND_ENABLETRANSCODINGCONFIG=true
      - ND_COVERARTPRIORITY=embedded,folder.*, cover.*, front.*, album.*
      - ND_LASTFM_ENABLED=true
      - ND_LASTFM_APIKEY=${ND_LASTFM_APIKEY}
      - ND_LASTFM_SECRET=${ND_LASTFM_SECRET}
      - ND_LRCLIB_ENABLED=true
      - ND_LYRICSPRIORITY=nd-lyrics,.lrc,embedded
      - PUID=${PUID}
      - PGID=${PGID}
    restart: unless-stopped
    networks:
      - default

  qbittorrent:
    image: linuxserver/qbittorrent
    container_name: qbittorrent
    ports:
      - 8087:8080
      - 6881:6881
      - 6881:6881/udp
    volumes:
      - ${SELFHOST_ROOT}/qbittorrent/appdata:/config
      - ${SELFHOST_ROOT}/data:/data
    environment:
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
      - PUID=${PUID}
      - PGID=${PGID}
    restart: unless-stopped
    networks:
      - default

  prowlarr:
    image: linuxserver/prowlarr
    container_name: prowlarr
    ports:
      - 9696:9696
    volumes:
      - ${SELFHOST_ROOT}/prowlarr/data:/config
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    dns:
      - 1.1.1.1
      - 1.0.0.1
      - 8.8.8.8
    restart: unless-stopped
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    networks:
      - default

  flaresolverr:
    image: flaresolverr/flaresolverr
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=America/Sao_Paulo
    ports:
      - "8191:8191"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8191/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    networks:
      - default

  radarr:
    image: linuxserver/radarr
    container_name: radarr
    ports:
      - 7878:7878
    volumes:
      - ${SELFHOST_ROOT}/radarr/data:/config
      - ${SELFHOST_ROOT}/data:/data
      - ${MOUNT_COLDSTORE}/media/movies:/data/coldstore/media/movies
      - ${MOUNT_NOTEBOOK}/media/movies:/data/notebook/media/movies
      - ${MOUNT_SECONDSTORE}/media/movies:/data/secondstore/media/movies
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    networks:
      - default

  sonarr:
    image: linuxserver/sonarr
    container_name: sonarr
    ports:
      - 8989:8989
    volumes:
      - ${SELFHOST_ROOT}/sonarr/data:/config
      - ${SELFHOST_ROOT}/data:/data
      - ${MOUNT_COLDSTORE}/media/tv:/data/coldstore/media/tv
      - ${MOUNT_NOTEBOOK}/media/tv:/data/notebook/media/tv
      - ${MOUNT_SECONDSTORE}/media/tv:/data/secondstore/media/tv
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    networks:
      - default

  lidarr:
    image: linuxserver/lidarr:nightly-3.1.3.4956-ls199
    container_name: lidarr
    ports:
      - 8686:8686
    volumes:
      - ${SELFHOST_ROOT}/lidarr/data:/config
      - ${MUSIC_DIR}/Artists:/data/music/Artists
      - ${SELFHOST_ROOT}/data/downloads/complete:/data/downloads/complete
      - ${SELFHOST_ROOT}/slskd/data/downloads:/app/downloads
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - LIDARR__LOG__LEVEL=${LOG_LEVEL}
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    networks:
      - default

  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    ports:
      - "5030:5030"
      - "5031:5031"
      - "50300:50300"
    volumes:
      - ${SELFHOST_ROOT}/slskd/data:/app
      - ${SELFHOST_ROOT}/data/downloads/slskd:/downloads
      - ${MUSIC_DIR}/Artists:/data/music:ro
    environment:
      - SLSKD_SLSK_USERNAME=${SLSKD_USER}
      - SLSKD_SLSK_PASSWORD=${SLSKD_PASSWORD}
      - SLSKD_WEB_API_KEYS_0_KEY=${SLSKD_API_KEY}
      - SLSKD_REMOTE_CONFIGURATION=true
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    restart: unless-stopped
    networks:
      - default

  bazarr:
    image: ghcr.io/lavx/bazarr:latest
    container_name: bazarr
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 2g
    depends_on:
      opensubtitles-scraper:
        condition: service_healthy
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
      - OPENSUBTITLES_SCRAPER_URL=http://opensubtitles-scraper:8000
      - BAZARR_BASE_URL=/
    volumes:
      - ${SELFHOST_ROOT}/bazarr/config:/config
      - ${SELFHOST_ROOT}/data/media/movies:/data/media/movies
      - ${SELFHOST_ROOT}/data/media/tv:/data/media/tv
      - ${MOUNT_COLDSTORE}/media/movies:/data/coldstore/media/movies
      - ${MOUNT_COLDSTORE}/media/tv:/data/coldstore/media/tv
      - ${MOUNT_NOTEBOOK}/media/movies:/data/notebook/media/movies
      - ${MOUNT_NOTEBOOK}/media/tv:/data/notebook/media/tv
      - ${MOUNT_SECONDSTORE}/media/tv:/data/secondstore/media/tv
      - ${MOUNT_SECONDSTORE}/media/movies:/data/secondstore/media/movies
    ports:
      - 6767:6767
    restart: unless-stopped
    networks:
      - default
    dns:
      - 1.1.1.1
      - 8.8.8.8

  opensubtitles-scraper:
    image: ghcr.io/lavx/opensubtitles-scraper:latest
    container_name: opensubtitles-scraper
    restart: unless-stopped
    depends_on:
      flaresolverr:
        condition: service_healthy
    ports:
      - 8000:8000
    environment:
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - default

  lingarr:
    image: ghcr.io/lingarr-translate/lingarr:latest
    container_name: lingarr
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 6g
    ports:
      - 9876:8080
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - ASPNETCORE_URLS=http://+:8080
      - DB_CONNECTION=sqlite
      - MAX_CONCURRENT_JOBS=1
      - SERVICE_TYPE=localai
      - LOCAL_AI_MODEL=qwen2.5:14b
      - LOCAL_AI_ENDPOINT=http://ollama:11434/v1/chat/completions
      - SOURCE_LANGUAGES=[{"name":"English","code":"en"}]
      - TARGET_LANGUAGES=[{"name":"Portuguese (Brazil)","code":"pt-BR"}]
    volumes:
      - ${SELFHOST_ROOT}/lingarr/config:/app/config
      - ${SELFHOST_ROOT}/data/media/movies:/data/media/movies
      - ${SELFHOST_ROOT}/data/media/tv:/data/media/tv
      - ${MOUNT_COLDSTORE}/media/movies:/movies
      - ${MOUNT_COLDSTORE}/media/tv:/tv
      - ${MOUNT_NOTEBOOK}/media/movies:/movies-notebook
      - ${MOUNT_NOTEBOOK}/media/tv:/tv-notebook
      - ${MOUNT_SECONDSTORE}/media/tv:/secondstore-tv
      - ${MOUNT_SECONDSTORE}/media/movies:/secondstore-movies
    networks:
      - default

  caddy:
    build: ${SELFHOST_ROOT}/caddy
    container_name: caddy
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    volumes:
      - ${SELFHOST_ROOT}/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ${SELFHOST_ROOT}/caddy/config:/config
      - ${SELFHOST_ROOT}/caddy/data:/data
    restart: unless-stopped
    networks:
      - default

  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${SELFHOST_ROOT}/data/ntfy/info:/etc/ntfy
      - ${SELFHOST_ROOT}/data/ntfy/cache:/var/cache/ntfy
    command:
      - serve
      - --config
      - /etc/ntfy/server.yml
    networks:
      - default

  uptime-kuma:
    image: louislam/uptime-kuma
    container_name: kuma
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${SELFHOST_ROOT}/kuma-data:/app/data
    networks:
      - default

  kavita:
    image: linuxserver/kavita:0.8.9
    container_name: kavita
    restart: unless-stopped
    ports:
      - 5001:5000
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${SELFHOST_ROOT}/kavita/config:/config
      - ${BOOKS_DIR}:/data
    networks:
      - default

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_DB: ${IMMICH_DB_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${IMMICH_DB_DATA_LOCATION}:/var/lib/postgresql/data
    env_file:
      - .env
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false
    networks:
      - default

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - '2283:2283'
    depends_on:
      - database
    restart: always
    healthcheck:
      disable: false
    networks:
      - default

networks:
  default:
    name: selfhost

volumes:
  netdata-config:
  netdata-lib:
  netdata-cache:
  portainer_data:
  nextcloud:
  db:
